services:
  # Measurement campaign (CSV output). See README, section
  # "Measurement campaign (v2)". Run on an otherwise idle Linux host with the
  # performance governor and turbo disabled; pin it to fixed cores.
  measure:
    build:
      context: .
      dockerfile: Dockerfile.measure
    image: compiler-benchmark-measure:latest
    cpuset: "2,3"           # adjust to isolated cores on the server
    cap_add:
      - PERFMON             # per-run hardware counters (optional; empty if denied)
    security_opt:
      - seccomp:unconfined  # avoid syscall-filter overhead in timed runs
    volumes:
      - ./results_csv:/app/results_csv
    command: ["--matrix", "config/matrix.yaml", "--reps", "10"]
