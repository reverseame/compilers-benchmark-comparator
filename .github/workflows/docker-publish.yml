name: Docker Publish

# Rebuilds only when something that actually enters the image changes:
# a rebuild moves the :latest digest even if the contents are identical,
# and the article pins the digest of the campaign image.
on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "Dockerfile.measure"
      - "scripts/**"
      - "config/**"
      - "programs/**"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "Dockerfile.measure"
      - "scripts/**"
      - "config/**"
      - "programs/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.measure
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
